<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#020617);
    color: white;
    overflow-x: hidden;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.title {
    font-size: 64px;
    font-weight: bold;
    background: linear-gradient(90deg,#6366f1,#9333ea,#6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 4s infinite linear;
}

@keyframes glow {
    0% { background-position: 0% }
    100% { background-position: 200% }
}

.subtitle {
    margin-top: 10px;
    font-size: 20px;
    color: #cbd5f5;
}

/* BIG BUTTON */
.big-btn {
    margin-top: 30px;
    padding: 20px 50px;
    font-size: 22px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(90deg,#ef4444,#dc2626);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.big-btn:hover {
    transform: scale(1.08);
}

/* PASSWORD BOX */
.pass-box {
    position: absolute;
    top: 20px;
    right: 20px;
    transition: 0.5s;
}

.pass-box input {
    padding: 8px;
    border-radius: 6px;
    border: none;
}

.pass-box button {
    padding: 8px;
}

/* HIDDEN AFTER LOGIN */
.hidden {
    opacity: 0;
    transform: scale(0.8);
}

/* MORE OPTIONS */
.more {
    margin-top: 30px;
    opacity: 0.6;
    cursor: pointer;
}

#extra {
    max-height: 0;
    overflow: hidden;
    transition: 0.7s;
}

#extra.show {
    max-height: 800px;
}

/* CARDS */
.card {
    max-width: 600px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

/* FILE LIST */
.file {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div class="pass-box" id="passBox">
    <input id="pass" type="password" placeholder="Enter password">
    <button onclick="login()">Go</button>
</div>

<!-- HERO -->
<div class="hero">

<div class="title">Merge PDF files</div>

<div class="subtitle">
Combine PDFs in the order you want with the easiest PDF merger available.
</div>

<input type="file" id="pdfs" multiple style="display:none">

<button class="big-btn" onclick="triggerUpload()">
Select PDF files
</button>

<div class="more" onclick="toggleExtra()">
✨ more options
</div>

</div>

<!-- HIDDEN SECTION -->
<div id="extra">

<div class="card">
    <h3>hmmm... this is something new, give it a try!</h3>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
</div>

<div class="card">
    <h3>Thanks</h3>
    <div id="list"></div>
</div>

</div>

<script>

let loggedIn = false;

function triggerUpload(){
    if(!loggedIn){
        alert("Enter password first");
        return;
    }
    document.getElementById("pdfs").click();
}

async function login() {
    const password = document.getElementById("pass").value;
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password})
    });
    const data = await res.json();

    if(data.success){
        loggedIn = true;
        document.getElementById("passBox").classList.add("hidden");
        loadFiles();
    } else {
        alert("Wrong password");
    }
}

document.getElementById("pdfs").addEventListener("change", merge);

async function merge() {
    const files = document.getElementById("pdfs").files;
    const form = new FormData();

    for(let f of files){
        form.append("pdfs", f);
    }

    const res = await fetch("/merge", {
        method: "POST",
        body: form
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    window.open(url);
}

async function upload() {
    const file = document.getElementById("file").files[0];
    const form = new FormData();
    form.append("file", file);

    await fetch("/upload", {
        method: "POST",
        body: form
    });

    loadFiles();
}

async function loadFiles() {
    const res = await fetch("/files");
    const files = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    files.forEach(f => {
        list.innerHTML += `
        <div class="file">
            ${f}
            <div>
                <button onclick="download('${f}')">Download</button>
                <button onclick="del('${f}')">Delete</button>
            </div>
        </div>`;
    });
}

function download(name){
    window.open("/download/" + name);
}

async function del(name){
    const pass = prompt("Enter admin password:");

    const res = await fetch("/delete", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({filename: name, adminPassword: pass})
    });

    const data = await res.json();

    if(data.success){
        loadFiles();
    } else {
        alert("Wrong admin password");
    }
}

function toggleExtra(){
    document.getElementById("extra").classList.toggle("show");
}

</script>

</body>
</html>
