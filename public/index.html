<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f8fafc;
    text-align:center;
}

h1{
    margin-top:60px;
    font-size:48px;
}

p{
    color:#555;
}

/* MAIN BUTTON */
.main-btn{
    margin-top:30px;
    padding:25px 60px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:#ef4444;
    color:white;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* MORE */
#extra{
    display:none;
    margin-top:40px;
}

/* FILE LIST */
.file{
    margin:10px;
}
</style>
</head>

<body>

<h1>Merge PDF files</h1>
<p>Combine PDFs in the order you want with the easiest PDF merger available.</p>

<input type="file" id="pdfs" multiple style="display:none">

<button class="main-btn" onclick="selectFiles()">
Select PDF files
</button>

<br><br>
<div id="drop">or drop PDFs here</div>

<br>
<button onclick="toggle()">More Options</button>

<div id="extra">

<h3>hmmm... this is something new, give it a try!</h3>

<input type="file" id="file">
<br>
<button onclick="upload()">Upload</button>

<h3>Thanks</h3>
<div id="list"></div>

</div>

<script>

/* SELECT + MERGE */
function selectFiles(){
    document.getElementById("pdfs").click();
}

document.getElementById("pdfs").addEventListener("change", merge);

async function merge(){
    const form = new FormData();

    for(let f of pdfs.files){
        form.append("pdfs", f);
    }

    const res = await fetch("/merge", {
        method:"POST",
        body: form
    });

    const blob = await res.blob();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "merged.pdf";
    a.click();
}

/* UPLOAD */
async function upload(){
    const pass = prompt("Enter main password:");
    const form = new FormData();
    form.append("file", file.files[0]);

    await fetch("/upload", {
        method:"POST",
        headers:{ password: pass },
        body: form
    });

    load();
}

/* LOAD FILES */
async function load(){
    const res = await fetch("/files");
    const files = await res.json();

    list.innerHTML="";

    files.forEach(f=>{
        list.innerHTML += `
        <div class="file">
            ${f}
            <button onclick="download('${f}')">Download</button>
            <button onclick="del('${f}')">Delete</button>
        </div>`;
    });
}

/* DOWNLOAD */
async function download(name){
    const pass = prompt("Enter main password:");

    window.open("/download/" + name, "_blank", 
        `headers=password:${pass}`);
}

/* DELETE */
async function del(name){
    const pass = prompt("Enter delete password:");

    const res = await fetch("/delete", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({filename:name,password:pass})
    });

    const data = await res.json();

    if(data.success){
        load();
    } else {
        alert("Wrong password");
    }
}

/* TOGGLE */
function toggle(){
    extra.style.display = extra.style.display==="block" ? "none" : "block";
}

load();

</script>

</body>
</html>
