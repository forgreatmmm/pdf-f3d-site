<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* TITLE */
.title {
    text-align: center;
    font-size: 60px;
    margin-top: 40px;
    background: linear-gradient(90deg,#6366f1,#9333ea,#6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* DESC */
.desc {
    text-align: center;
    margin-top: 10px;
    color: #cbd5f5;
}

/* CARD */
.card {
    max-width: 700px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

/* BUTTON */
button {
    padding: 10px 20px;
    cursor: pointer;
}

/* FILE LIST */
.file {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

/* HIDDEN */
#extra {
    max-height: 0;
    overflow: hidden;
    transition: 0.6s;
}
#extra.show {
    max-height: 1000px;
}
</style>
</head>

<body>

<div class="title">PDF MERGER</div>
<div class="desc">Combine PDFs in the order you want with the easiest PDF merger available.</div>

<!-- LOGIN -->
<div class="card" id="loginCard">
    <input id="pass" type="password" placeholder="Enter Password">
    <button onclick="login()">Enter</button>
</div>

<div id="main" style="display:none">

<!-- MERGE -->
<div class="card">
    <input type="file" id="pdfs" multiple>
    <button onclick="merge()">Merge PDFs</button>
</div>

<!-- MORE -->
<div style="text-align:center; cursor:pointer;" onclick="toggle()">✨ More Options</div>

<div id="extra">

<!-- UPLOAD -->
<div class="card">
    <div>hmmm... this is something new, give it a try!</div>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
</div>

<!-- FILES -->
<div class="card">
    <div>Thanks</div>
    <div id="list"></div>
</div>

</div>

</div>

<script>

/* LOGIN */
async function login(){
    const res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:pass.value})
    });

    const data = await res.json();

    if(data.success){
        main.style.display="block";
        loginCard.style.display="none";
        loadFiles();
    } else {
        alert("Wrong password");
    }
}

/* MERGE */
async function merge(){
    const form = new FormData();

    for(let f of pdfs.files){
        form.append("pdfs", f);
    }

    const res = await fetch("/merge",{method:"POST",body:form});
    const blob = await res.blob();

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "merged.pdf";
    a.click();
}

/* UPLOAD */
async function upload(){
    const form = new FormData();
    form.append("file", file.files[0]);

    await fetch("/upload",{method:"POST",body:form});

    setTimeout(loadFiles, 800);
}

/* LOAD FILES */
async function loadFiles(){
    const res = await fetch("/files");
    const files = await res.json();

    list.innerHTML = "";

    files.forEach(f=>{
        list.innerHTML += `
        <div class="file">
            ${f}
            <div>
                <button onclick="download('${f}')">Download</button>
                <button onclick="del('${f}')">Delete</button>
            </div>
        </div>`;
    });
}

/* DOWNLOAD */
function download(name){
    window.open("/download/"+name);
}

/* DELETE */
async function del(name){
    const pass = prompt("Admin password:");

    const res = await fetch("/delete",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({filename:name, adminPassword:pass})
    });

    const data = await res.json();

    if(data.success){
        loadFiles();
    } else {
        alert("Wrong password");
    }
}

/* TOGGLE */
function toggle(){
    extra.classList.toggle("show");
}

/* AUTO LOAD */
window.onload = loadFiles;

</script>

</body>
</html>
