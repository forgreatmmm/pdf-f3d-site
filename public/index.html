<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>

<style>
body {
    background:#020617;
    color:white;
    font-family:sans-serif;
    text-align:center;
}
.card {
    background:#111827;
    padding:20px;
    margin:20px;
    border-radius:12px;
}
button {
    padding:10px 20px;
    background:#6366f1;
    border:none;
    border-radius:8px;
    color:white;
}
.file {
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>PDF MERGER</h1>
<p>Combine PDFs in the easiest way.</p>

<div class="card">
    <input type="file" id="pdfs" multiple>
    <br><br>
    <button onclick="merge()">Merge PDFs</button>
</div>

<h3 onclick="unlock()" style="cursor:pointer;">✨ More Options ✨</h3>

<div id="secret" style="display:none;">

<div class="card">
    <p>Hmmm... this is something new, give it a try!</p>
    <input type="file" id="file">
    <br><br>
    <button onclick="upload()">Upload</button>
</div>

<div class="card">
    <p>Thanks.</p>
    <div id="list"></div>
</div>

</div>

<script>

let unlocked = false;

function unlock(){
    if(unlocked) return;

    const pass = prompt("Enter password:");

    if(pass === "1234"){
        unlocked = true;
        document.getElementById("secret").style.display = "block";
        loadFiles();
    } else {
        alert("Wrong password");
    }
}

// ===== MERGE =====
async function merge(){
    const files = document.getElementById("pdfs").files;
    const form = new FormData();

    for(let f of files){
        form.append("pdfs", f);
    }

    const res = await fetch("/merge",{method:"POST",body:form});
    const blob = await res.blob();
    window.open(URL.createObjectURL(blob));
}

// ===== UPLOAD =====
async function upload(){
    const file = document.getElementById("file").files[0];
    const form = new FormData();
    form.append("file", file);

    document.querySelector("button").innerText = "Uploading...";

    await fetch("/upload",{method:"POST",body:form});

    document.querySelector("button").innerText = "Upload";

    loadFiles();
}

// ===== FILES =====
async function loadFiles(){
    const res = await fetch("/files");
    const files = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    files.forEach(f=>{
        list.innerHTML += `
        <div class="file">
            ${f.original_filename}
            <div>
                <button onclick="window.open('${f.url}')">Download</button>
                <button onclick="del('${f.public_id}')">Delete</button>
            </div>
        </div>`;
    });
}

// ===== DELETE =====
async function del(id){
    const pass = prompt("Admin password:");

    const res = await fetch("/delete",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({public_id:id,adminPassword:pass})
    });

    const data = await res.json();

    if(data.success) loadFiles();
    else alert("Wrong admin password");
}

</script>

</body>
</html>
