<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

.title {
    text-align: center;
    font-size: 52px;
    font-weight: bold;
    margin-bottom: 30px;
    letter-spacing: 2px;
    color: #6366f1;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.section-title {
    font-size: 20px;
    margin-bottom: 10px;
    color: #cbd5f5;
}

input[type="password"],
input[type="file"] {
    margin: 10px 0;
    padding: 12px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: white;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #6366f1, #9333ea);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.07);
    opacity: 0.9;
}

.file {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.05);
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    align-items: center;
}
</style>
</head>

<body>

<div class="container">

<div class="title">PDF MERGER</div>

<div class="card">
    <div class="section-title">Enter Password</div>
    <input id="pass" type="password">
    <button onclick="login()">Enter</button>
</div>

<div id="main" style="display:none">

<div class="card">
    <div class="section-title">Merge PDFs</div>
    <input type="file" id="pdfs" multiple>
    <button onclick="merge()">Merge PDFs</button>
</div>

<div class="card">
    <div class="section-title">Upload F3D File</div>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
</div>

<div class="card">
    <div class="section-title">Files</div>
    <div id="list"></div>
</div>

</div>

</div>

<script>
async function login() {
    const password = document.getElementById("pass").value;
    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password})
    });
    const data = await res.json();

    if(data.success){
        document.getElementById("main").style.display = "block";
        loadFiles();
    } else {
        alert("Wrong password");
    }
}

async function merge() {
    const files = document.getElementById("pdfs").files;
    const form = new FormData();

    for(let f of files){
        form.append("pdfs", f);
    }

    const res = await fetch("/merge", {
        method: "POST",
        body: form
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    window.open(url);
}

async function upload() {
    const file = document.getElementById("file").files[0];
    const form = new FormData();
    form.append("file", file);

    await fetch("/upload", {
        method: "POST",
        body: form
    });

    loadFiles();
}

async function loadFiles() {
    const res = await fetch("/files");
    const files = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    files.forEach(f => {
        list.innerHTML += `
        <div class="file">
            ${f}
            <div>
                <button onclick="download('${f}')">Download</button>
                <button onclick="del('${f}')">Delete</button>
            </div>
        </div>`;
    });
}

function download(name){
    window.open("/download/" + name);
}

async function del(name){
    const pass = prompt("Enter admin password:");

    const res = await fetch("/delete", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({filename: name, adminPassword: pass})
    });

    const data = await res.json();

    if(data.success){
        loadFiles();
    } else {
        alert("Wrong admin password");
    }
}
</script>

</body>
</html>
