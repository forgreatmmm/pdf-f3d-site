<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

h1{
    font-size:60px;
    margin-top:60px;
}

button{
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:10px;
    background:#6366f1;
    color:white;
    cursor:pointer;
}

#extra{display:none;}
#chatBox{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111;
    padding:10px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<h1>Merge PDF Files</h1>
<p>Combine PDFs in the order you want with the easiest PDF merger available.</p>

<input type="file" id="pdfs" multiple>
<br>
<button onclick="merge()">Merge</button>

<br><br>

<button onclick="toggleExtra()">More Options</button>

<div id="extra">
    <h3>hmmm... this is something new, give it a try!</h3>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>

    <h3>Thanks</h3>
    <div id="list"></div>
</div>

<br><br>
<button onclick="pause()">Pause Website</button>

<div id="chatBox">
    <div id="chat"></div>
    <input id="msg">
    <button onclick="send()">Send</button>
    <button onclick="clearChat()">Delete All</button>
</div>

<button onclick="openChat()">💬</button>

<script>

/* MERGE */
async function merge(){
    const form=new FormData();
    for(let f of pdfs.files) form.append("pdfs",f);

    const res=await fetch("/merge",{method:"POST",body:form});
    const blob=await res.blob();
    window.open(URL.createObjectURL(blob));
}

/* UPLOAD */
async function upload(){
    const form=new FormData();
    form.append("file",file.files[0]);
    await fetch("/upload",{method:"POST",body:form});
    load();
}

/* FILES */
async function load(){
    const res=await fetch("/files");
    const data=await res.json();
    list.innerHTML="";
    data.forEach(f=>{
        list.innerHTML+=`<div>${f}
        <button onclick="del('${f}')">Delete</button></div>`;
    });
}

/* DELETE */
async function del(f){
    const pass=prompt("Password:");
    await fetch("/delete",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({filename:f,password:pass})
    });
    load();
}

/* MORE */
function toggleExtra(){
    extra.style.display=extra.style.display==="block"?"none":"block";
}

/* PAUSE */
async function pause(){
    const pass=prompt("Admin password:");
    const res=await fetch("/togglePause",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:pass})
    });
    alert("Toggled");
}

/* CHAT */
async function openChat(){
    const pass=prompt("Chat password:");
    const r=await fetch("/auth",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:pass})
    });
    const d=await r.json();
    if(d.role==="chat"||d.role==="admin"){
        chatBox.style.display="block";
        loadChat();
    }
}

async function loadChat(){
    const r=await fetch("/chat");
    const data=await r.json();
    chat.innerHTML=data.join("<br>");
}

async function send(){
    await fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({msg:msg.value})
    });
    msg.value="";
    loadChat();
}

async function clearChat(){
    const pass=prompt("Password:");
    await fetch("/chat/delete",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:pass})
    });
    loadChat();
}

load();

</script>

</body>
</html>
