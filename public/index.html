<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

.title {
    text-align: center;
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #6366f1;
}

.desc {
    text-align: center;
    color: #cbd5f5;
    margin-bottom: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 20px;
    backdrop-filter: blur(12px);
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #6366f1, #9333ea);
    color: white;
    cursor: pointer;
}

.file {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.05);
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">PDF MERGER</div>
<div class="desc">
Combine PDFs in the order you want with the easiest PDF merger available.
</div>

<div class="card">
    <input type="file" id="pdfs" multiple>
    <br><br>
    <button onclick="merge()">Merge PDFs</button>
</div>

<div style="text-align:center; margin:20px 0;">
✨ More Options ✨
</div>

<div class="card">
    <div>Hmmm... this is something new, give it a try!</div>
    <input type="file" id="file">
    <br><br>
    <button onclick="upload()">Upload</button>
</div>

<div class="card">
    <div>Thanks.</div>
    <div id="list"></div>
</div>

</div>

<script>
async function merge() {
    const files = document.getElementById("pdfs").files;
    const form = new FormData();

    for(let f of files){
        form.append("pdfs", f);
    }

    const res = await fetch("/merge", {
        method: "POST",
        body: form
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    window.open(url);
}

async function upload() {
    const file = document.getElementById("file").files[0];
    const form = new FormData();
    form.append("file", file);

    await fetch("/upload", {
        method: "POST",
        body: form
    });

    loadFiles();
}

async function loadFiles() {
    const res = await fetch("/files");
    const files = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    files.forEach(f => {
        list.innerHTML += `
        <div class="file">
            ${f.original_filename}
            <div>
                <button onclick="download('${f.url}')">Download</button>
                <button onclick="del('${f.public_id}')">Delete</button>
            </div>
        </div>`;
    });
}

function download(url){
    window.open(url);
}

async function del(public_id){
    const pass = prompt("Enter admin password:");

    const res = await fetch("/delete", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({public_id, adminPassword: pass})
    });

    const data = await res.json();

    if(data.success){
        loadFiles();
    } else {
        alert("Wrong admin password");
    }
}

// auto load
loadFiles();
</script>

</body>
</html>
