<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF MERGER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

.title {
    text-align: center;
    font-size: 60px;
    font-weight: bold;
    margin-top: 40px;
    letter-spacing: 3px;
    background: linear-gradient(90deg,#6366f1,#9333ea,#6366f1);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 4s infinite linear;
}

@keyframes shine {
    0% { background-position: 0% }
    100% { background-position: 200% }
}

.card {
    max-width: 700px;
    margin: 30px auto;
    padding: 25px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.section-title {
    font-size: 22px;
    margin-bottom: 10px;
    color: #cbd5f5;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #020617;
    color: white;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg,#6366f1,#9333ea);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

.file {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
}

#extra {
    max-height: 0;
    overflow: hidden;
    transition: 0.7s ease;
}

#extra.show {
    max-height: 1000px;
}

.more-btn {
    text-align: center;
    margin: 30px;
    cursor: pointer;
    opacity: 0.7;
}

.flower {
    position: fixed;
    top: -50px;
    font-size: 24px;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="title">PDF MERGER</div>

<div class="card">
    <div class="section-title">Authentication</div>
    <input id="pass" type="password" placeholder="Enter password">
    <button onclick="login()">Enter</button>
</div>

<div id="main" style="display:none">

<div class="card">
    <div class="section-title">Merge PDF Files</div>
    <input type="file" id="pdfs" multiple>
    <button onclick="merge()">Merge PDFs</button>
</div>

<div class="more-btn" onclick="toggleExtra()">✨ More Options ✨</div>

<div id="extra">

<div class="card">
    <div class="section-title">Hmmm… this is something new, give it a try!</div>
    <input type="file" id="file">
    <button onclick="upload()">Upload</button>
</div>

<div class="card">
    <div class="section-title">Thanks.</div>
    <div id="list"></div>
</div>

</div>

</div>

<script>
async function login() {
    const password = document.getElementById("pass").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password})
    });

    const data = await res.json();

    if(data.success){
        document.getElementById("main").style.display = "block";
        loadFiles();
    } else {
        alert("Wrong password");
    }
}

async function merge() {
    const files = document.getElementById("pdfs").files;
    const form = new FormData();

    for(let f of files){
        form.append("pdfs", f);
    }

    const res = await fetch("/merge", {
        method: "POST",
        body: form
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    window.open(url);
}

async function upload() {
    const file = document.getElementById("file").files[0];
    const form = new FormData();
    form.append("file", file);

    await fetch("/upload", {
        method: "POST",
        body: form
    });

    loadFiles();
}

async function loadFiles() {
    const res = await fetch("/files");
    const files = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    files.forEach(f => {
        list.innerHTML += `
        <div class="file">
            ${f.name}
            <div>
                <button onclick="download('${f.id}')">Download</button>
                <button onclick="del('${f.id}')">Delete</button>
            </div>
        </div>`;
    });
}

function download(id){
    window.open("/download/" + id);
}

async function del(id){
    const pass = prompt("Enter admin password:");

    const res = await fetch("/delete", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id: id, adminPassword: pass})
    });

    const data = await res.json();

    if(data.success){
        loadFiles();
    } else {
        alert("Wrong admin password");
    }
}

function toggleExtra(){
    const extra = document.getElementById("extra");
    extra.classList.toggle("show");

    createFlower();
    setTimeout(createFlower, 2000);
}

function createFlower(){
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = Math.random()*100 + "vw";
    document.body.appendChild(flower);

    setTimeout(()=>flower.remove(),3000);
}
</script>

</body>
</html>
